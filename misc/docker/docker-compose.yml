version: '3.9'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: knowledge-base-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrator:
    build:
      context: ../..
      dockerfile: misc/docker/Dockerfile
    container_name: knowledge-base-migrator
    restart: on-failure
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}
    entrypoint: /bin/sh -c
    command:
      - |
        psql -h postgres -U ${DB_USER} -d ${DB_NAME} -c "CREATE EXTENSION IF NOT EXISTS vector" 2>/dev/null || true &&
        alembic upgrade head

  app:
    build:
      context: ../..
      dockerfile: misc/docker/Dockerfile
    container_name: knowledge-base-app
    restart: unless-stopped
    depends_on:
      migrator:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: ${DATABASE_URL}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      VOYAGE_API_KEY: ${VOYAGE_API_KEY}
      CHUNK_SIZE: ${CHUNK_SIZE}
      CHUNK_OVERLAP: ${CHUNK_OVERLAP}
      RETRIEVAL_TOP_K: ${RETRIEVAL_TOP_K}
    ports:
      - "${APP_PORT}:8000"
    volumes:
      - ../../:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
